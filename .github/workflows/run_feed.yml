name: Run Special Situations Feed

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 8am ET (1pm UTC), weekdays only
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  run-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_situations.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_situations.py

      - name: Run send_email.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_email.py

      - name: Commit and push updated feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed_data/feed.json
          git diff --cached --quiet || git commit -m "Feed update $(date +%Y-%m-%d)"
          git push
