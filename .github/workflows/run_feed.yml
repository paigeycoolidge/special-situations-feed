name: Run Special Situations Feed

on:
  schedule:
    - cron: '0 13 * * 1-5'  # 8am ET (1pm UTC), weekdays only
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  run-feed:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug secrets
        run: |
          echo "ANTHROPIC_API_KEY first 10 chars: $(echo $ANTHROPIC_API_KEY | cut -c1-10)"
          echo "ANTHROPIC_API_KEY length: ${#ANTHROPIC_API_KEY}"
          echo "NEWS_API_KEY set: $( [ -n "$NEWS_API_KEY" ] && echo yes || echo no )"

      - name: Run fetch_situations.py
        run: python fetch_situations.py

      - name: Run send_email.py
        run: python send_email.py

      - name: Commit and push updated feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed_data/feed.json
          git diff --cached --quiet || git commit -m "Feed update $(date +%Y-%m-%d)"
          git push
